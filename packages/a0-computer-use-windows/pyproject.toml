[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "a0-computer-use-windows"
version = "1.5"
description = "Windows computer-use backend for a0"
requires-python = ">=3.10"
dependencies = [
    "a0>=1.5",
    "dxcam; platform_system == 'Windows'",
    "pillow; platform_system == 'Windows'",
    "pywinauto; platform_system == 'Windows'",
]

[project.entry-points."a0.computer_use_backends"]
windows = "a0_computer_use_windows.backend:WINDOWS_BACKEND_SPEC"

[tool.hatch.build.targets.wheel]
packages = ["src/a0_computer_use_windows"]
