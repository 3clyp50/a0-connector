[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "a0-computer-use-wayland"
version = "1.5"
description = "Wayland computer-use backend for a0"
requires-python = ">=3.10"
authors = [
    { name = "agent0ai" },
]
dependencies = [
    "a0>=1.5",
]

[project.entry-points."a0.computer_use_backends"]
wayland = "a0_computer_use_wayland.backend:WAYLAND_BACKEND_SPEC"

[tool.hatch.build.targets.wheel]
packages = ["src/a0_computer_use_wayland"]
