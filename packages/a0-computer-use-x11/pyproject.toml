[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "a0-computer-use-x11"
version = "1.5"
description = "X11 computer-use backend for a0"
requires-python = ">=3.10"
authors = [
    { name = "agent0ai" },
]
dependencies = [
    "a0>=1.5",
    "mss>=10.1.0",
    "python-xlib>=0.33",
]

[project.entry-points."a0.computer_use_backends"]
x11 = "a0_computer_use_x11.backend:X11_BACKEND_SPEC"

[tool.hatch.build.targets.wheel]
packages = ["src/a0_computer_use_x11"]
